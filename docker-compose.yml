services:

  db:
    image: postgres:16-alpine
    container_name: liquidador_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_liquidador_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: liquidador_redis
    restart: unless-stopped
    networks:
      - backend_liquidador_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: liquidador_web
    command: gunicorn backend_liquidador.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - backend_liquidador_network
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    container_name: liquidador_worker
    entrypoint: [""]          # omite el entrypoint de migraciones en worker
    command: celery -A backend_liquidador worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - media_volume:/app/media
    env_file:
      - .env
    networks:
      - backend_liquidador_network
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: .
    container_name: liquidador_beat
    entrypoint: [""]          # omite el entrypoint de migraciones en beat
    command: celery -A backend_liquidador beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    networks:
      - backend_liquidador_network
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:
  postgres_data:

networks:
  backend_liquidador_network:
    driver: bridge